name: ci

on:
  push:
    branches: [main, release-please--branches--main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - run: go mod tidy
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
